name: mind_feed
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  bloc: ^9.0.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  data_connection_checker_tv: ^0.3.5-nullsafety
  dio: ^5.9.0
  flutter:
    sdk: flutter
  flutter_advanced_drawer: ^1.5.0
  flutter_animate_on_scroll: ^0.3.0
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.0
  google_nav_bar: ^5.0.7
  line_icons: ^2.0.3
  logger: ^2.6.1
  modal_progress_hud_nsn: ^0.5.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utls/
  filename: app_images.dart

flutter:
  uses-material-design: true
